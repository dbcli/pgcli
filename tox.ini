[tox]
envlist = py

[testenv]
skip_install = true
deps = uv
commands = uv pip install -e .[dev]
        coverage run -m pytest -v tests
        coverage report -m
passenv = PGHOST
    PGPORT
    PGUSER
    PGPASSWORD
    PYTHONIOENCODING
setenv =
    PYTHONIOENCODING = utf-8

[testenv:style]
skip_install = true
deps = ruff
commands = ruff check
        ruff format --diff

[testenv:integration]
skip_install = true
deps = uv
commands = uv pip install -e .[dev]
        behave tests/features --no-capture
passenv =
    PYTHONIOENCODING
setenv =
    PYTHONIOENCODING = utf-8

[testenv:rest]
skip_install = true
deps = uv
commands = uv pip install -e .[dev]
        docutils --halt=warning changelog.rst
